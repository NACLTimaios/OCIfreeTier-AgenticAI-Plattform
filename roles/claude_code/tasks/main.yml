---
- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: [claude_code, nodejs]

- name: Download NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.gpg.key
    mode: '0644'
    force: false
  tags: [claude_code, nodejs]

- name: Dearmor NodeSource GPG key
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource.gpg.key
    creates: /etc/apt/keyrings/nodesource.gpg
  tags: [claude_code, nodejs]

- name: Add NodeSource apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
    filename: nodesource
    state: present
  tags: [claude_code, nodejs]

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  tags: [claude_code, nodejs]

- name: Check if Claude Code is already installed
  ansible.builtin.command: which claude
  register: claude_which
  changed_when: false
  failed_when: false
  tags: [claude_code, install]

- name: Install Claude Code globally via npm
  ansible.builtin.command: npm install -g {{ claude_code_npm_package }}
  when: claude_which.rc != 0
  changed_when: true
  tags: [claude_code, install]

- name: Set ANTHROPIC_API_KEY in system environment
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^ANTHROPIC_API_KEY="
    line: "ANTHROPIC_API_KEY={{ claude_api_key }}"
    state: present
  tags: [claude_code, config]
